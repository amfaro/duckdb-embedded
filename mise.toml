[tools]
actionlint = "latest"
cmake = "latest"
ninja = "latest"

# Rust toolchain — required for Corrosion when building evalexpr_rhai's Rust component.
rust = [
  { version = "1.93.1" }
]

[env]
DUCKDB_VERSION = "1.3.2"

# Tells libduckdb-sys (used by the duckdb crate) where to find our custom build.
DUCKDB_LIB_DIR = "{{config_root}}/build/release/src"
DUCKDB_INCLUDE_DIR = "{{config_root}}/vendor/duckdb/src/include"
LD_LIBRARY_PATH = "{{config_root}}/build/release/src:{{env.LD_LIBRARY_PATH | default(value='')}}"
DYLD_LIBRARY_PATH = "{{config_root}}/build/release/src:{{env.DYLD_LIBRARY_PATH | default(value='')}}"

[task_config]
includes = [".mise/tasks"]
