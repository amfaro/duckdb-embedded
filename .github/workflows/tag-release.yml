name: tag-release

on:
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: amfaro/actions/setup-mise@v1
        with:
          app-id: ${{ secrets.REPO_CLIENT_ID }}
          private-key: ${{ secrets.REPO_CLIENT_PRIVATE_KEY }}

      - name: Create and push release tag
        run: mise run release:tag
