name: tag-release

on:
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REPO_CLIENT_ID }}
          private-key: ${{ secrets.REPO_CLIENT_PRIVATE_KEY }}
          owner: amfaro
          repositories: duckdb-embedded

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup mise
        uses: jdx/mise-action@v3
        env:
          MISE_ENV: ci
          MISE_JOBS: "1"
        with:
          experimental: true

      - name: Create and push release tag
        run: mise run release:tag
