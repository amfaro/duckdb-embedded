name: prepare-release

on:
  push:
    branches:
      - main
    paths-ignore:
      - VERSION

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v4
        env:
          MISE_ENV: ci
          MISE_JOBS: "1"
        with:
          experimental: true

      - name: Prepare release pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: mise run release:prepare
