name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to create (e.g., v1.3.2-1)"
        required: true
        default: "v0.0.0-test"
      prerelease:
        description: "Mark the release as a prerelease"
        required: true
        default: true
        type: boolean

jobs:
  validate-tag:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      release_tag: ${{ steps.parse.outputs.release_tag }}
      duckdb_version: ${{ steps.parse.outputs.duckdb_version }}
      build_number: ${{ steps.parse.outputs.build_number }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
    steps:
      - name: Parse and validate release tag
        id: parse
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
          IS_PRERELEASE="${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'false' }}"

          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

          # Release tags: v{MAJOR}.{MINOR}.{PATCH}-{BUILD} (e.g., v1.3.2-1)
          # Prerelease/test tags are allowed to be freeform (e.g., v0.0.0-test)
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            echo "Prerelease tag '${TAG}' — skipping strict format validation"
            echo "duckdb_version=" >> "$GITHUB_OUTPUT"
            echo "build_number=" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)$ ]]; then
            echo "duckdb_version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "build_number=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
            echo "Parsed: DuckDB ${BASH_REMATCH[1]}, build ${BASH_REMATCH[2]}"
          else
            echo "::error::Tag '${TAG}' does not match required format vX.Y.Z-N (e.g., v1.3.2-1)"
            exit 1
          fi

  build-artifacts:
    needs: validate-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            asset_name: libduckdb-osx-arm64.zip
            lib_name: libduckdb.dylib
          - runner: blacksmith-4vcpu-ubuntu-2404
            asset_name: libduckdb-linux-amd64.zip
            lib_name: libduckdb.so

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install mise tools
        run: mise install

      - name: Build custom shared libduckdb
        run: mise run build-duckdb

      - name: Package release archive
        run: |
          mkdir -p release
          cp "build/release/src/${{ matrix.lib_name }}" release/
          cp vendor/duckdb/src/include/duckdb.h release/
          cp vendor/duckdb/src/include/duckdb.hpp release/
          (cd release && zip -r "../${{ matrix.asset_name }}" .)

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  publish-release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [validate-tag, build-artifacts]
    env:
      RELEASE_TAG: ${{ needs.validate-tag.outputs.release_tag }}
      RELEASE_TARGET: ${{ github.sha }}
      IS_PRERELEASE: ${{ needs.validate-tag.outputs.is_prerelease }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_args=(
            "$RELEASE_TAG"
            --target "$RELEASE_TARGET"
            --title "$RELEASE_TAG"
            --notes ""
          )

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "${release_args[@]}"
          gh release upload "$RELEASE_TAG" dist/*/*.zip --clobber

  notify-consumers:
    if: needs.validate-tag.outputs.duckdb_version != '' && needs.validate-tag.outputs.is_prerelease == 'false'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [validate-tag, publish-release]
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DUCKDB_CLIENT_ID }}
          private-key: ${{ secrets.DUCKDB_CLIENT_PRIVATE_KEY }}
          owner: amfaro
          repositories: calc

      - name: Dispatch DuckDB upgrade to calc
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/amfaro/calc/dispatches \
            --method POST \
            --field event_type="duckdb-embedded-release" \
            --field 'client_payload[duckdb_version]=${{ needs.validate-tag.outputs.duckdb_version }}' \
            --field 'client_payload[embedded_version]=${{ needs.validate-tag.outputs.release_tag }}'
