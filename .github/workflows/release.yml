name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to create or update for this release"
        required: true
        default: "v0.0.0-test"
      prerelease:
        description: "Mark the release as a prerelease"
        required: true
        default: true
        type: boolean

jobs:
  build-artifacts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            asset_name: libduckdb-osx-arm64.zip
            lib_name: libduckdb.dylib
          - runner: blacksmith-4vcpu-ubuntu-2404
            asset_name: libduckdb-linux-amd64.zip
            lib_name: libduckdb.so

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install mise tools
        run: mise install

      - name: Build custom shared libduckdb
        run: mise run build-duckdb

      - name: Package release archive
        run: |
          mkdir -p release
          cp "build/release/src/${{ matrix.lib_name }}" release/
          cp vendor/duckdb/src/include/duckdb.h release/
          cp vendor/duckdb/src/include/duckdb.hpp release/
          (cd release && zip -r "../${{ matrix.asset_name }}" .)

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  publish-release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: build-artifacts
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      RELEASE_TARGET: ${{ github.sha }}
      IS_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'false' }}

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_args=(
            "$RELEASE_TAG"
            --target "$RELEASE_TARGET"
            --title "$RELEASE_TAG"
            --notes ""
          )

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "${release_args[@]}"
          gh release upload "$RELEASE_TAG" dist/*/*.zip --clobber
