name: releaste

on:
  push:
    tags:
      - "v*"

jobs:
  validate-tag:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      release_tag: ${{ steps.parse.outputs.release_tag }}
      duckdb_version: ${{ steps.parse.outputs.duckdb_version }}
    steps:
      - name: Parse release tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [[ ! "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)$ ]]; then
            echo "::error::Tag '$TAG' does not match required format vX.Y.Z-N"
            exit 1
          fi

          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "duckdb_version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"

  build-artifacts:
    needs: validate-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            asset_name: libduckdb-osx-arm64.zip
            lib_name: libduckdb.dylib
          - runner: blacksmith-4vcpu-ubuntu-2404
            asset_name: libduckdb-linux-amd64.zip
            lib_name: libduckdb.so

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: amfaro/actions/setup-mise@v1
        with:
          app-id: ${{ secrets.REPO_CLIENT_ID }}
          private-key: ${{ secrets.REPO_CLIENT_PRIVATE_KEY }}

      - name: Build custom shared libduckdb
        run: mise run build-duckdb

      - name: Package release archive
        run: mise run package-release-artifact "${{ matrix.lib_name }}" "${{ matrix.asset_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  publish-release:
    permissions:
      contents: write
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [validate-tag, build-artifacts]
    env:
      RELEASE_TAG: ${{ needs.validate-tag.outputs.release_tag }}
      RELEASE_TARGET: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" \
              --target "$RELEASE_TARGET" \
              --title "$RELEASE_TAG" \
              --notes ""
          gh release upload "$RELEASE_TAG" dist/*/*.zip --clobber

  notify-consumers:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [validate-tag, publish-release]
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DUCKDB_CLIENT_ID }}
          private-key: ${{ secrets.DUCKDB_CLIENT_PRIVATE_KEY }}
          owner: amfaro
          repositories: calc

      - name: Dispatch DuckDB upgrade to calc
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/amfaro/calc/dispatches \
            --method POST \
            --field event_type="duckdb-embedded-release" \
            --field 'client_payload[duckdb_version]=${{ needs.validate-tag.outputs.duckdb_version }}' \
            --field 'client_payload[embedded_version]=${{ needs.validate-tag.outputs.release_tag }}'
