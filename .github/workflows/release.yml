name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-artifacts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            asset_name: libduckdb-osx-arm64.zip
            lib_name: libduckdb.dylib
          - runner: blacksmith-4vcpu-ubuntu-2404
            asset_name: libduckdb-linux-amd64.zip
            lib_name: libduckdb.so

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install mise tools
        run: mise install

      - name: Build custom shared libduckdb
        run: mise run build-duckdb

      - name: Package release archive
        run: |
          mkdir -p release
          cp "build/release/src/${{ matrix.lib_name }}" release/
          cp vendor/duckdb/src/include/duckdb.h release/
          cp vendor/duckdb/src/include/duckdb.hpp release/
          (cd release && zip -r "../${{ matrix.asset_name }}" .)

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  publish-release:
    if: github.event_name == 'push'
    permissions:
      contents: write
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: build-artifacts

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes ""
          gh release upload "${GITHUB_REF_NAME}" dist/*/*.zip --clobber
